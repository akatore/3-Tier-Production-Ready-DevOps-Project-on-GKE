apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tier3

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Ingress
      name: tier3
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: app.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: app.example.com

labels:
  - pairs:
      environment: production
