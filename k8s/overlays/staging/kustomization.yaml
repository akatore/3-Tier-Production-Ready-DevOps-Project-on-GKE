apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tier3-staging

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: tier3
    patch: |
      - op: replace
        path: /metadata/name
        value: tier3-staging
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Ingress
      name: tier3
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: staging.app.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.app.example.com

labels:
  - pairs:
      environment: staging
